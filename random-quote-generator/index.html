<!DOCTYPE html>
<html lang="en">
<head>
   <meta charset="UTF-8">
   <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <title>Random Quote</title>
   <style>
      * {
         margin: 0;
         padding: 0;
         font-family: 'Trebuchet MS', 'Lucida Sans Unicode', 'Lucida Grande', 'Lucida Sans', Arial, sans-serif;
      }

      body {
         height: 100vh;
         display: flex;
         flex-direction: column;
         justify-content: center;
         align-items: center;
         gap: 2rem;
      }

      h1 {
         color: #404040;
      }

      .quote-container {
         background-color: #FFEDD4;
         padding: 2rem;
         width: 18rem;
         border-radius: 8px;
         box-shadow: 0px 1px 3px 0px rgba(0,0,0,0.5);
      }

      blockquote p {
         font-size: 20px;
         text-align: center;
      }

      p.author {
         font-size: 18px;
         font-style: italic;
         margin-top: 16px;
      }

      blockquote p::before {
         content: "\201C";
      }

      blockquote p::after {
         content: "\201D";
      }

      blockquote + p {
         text-align: right;
         padding-inline: 12px;
      }

      button {
         text-transform: uppercase;
         font-size: 18px;
         padding: 8px 16px;
         border-radius: 8px;
         cursor: pointer;
         border: none;
         background-color: #404040;
         color: white;
         box-shadow: 0px 4px 6px rgba(0,0,0,0.3);
         transition: background-color ease-out 0.3s;
      }

      button:hover {
         background-color: black;
      }

      button:active {
         box-shadow: none;
      }

      @media (width >= 48rem) {
         .quote-container {
            width: 45rem;
            padding: 2.5rem;
         }

         blockquote p {
            font-size: 24px;
         }

         p.author {
            font-size: 20px;
            margin-top: 20px;
         }
      }
   </style>
</head>
<body>
   <h1>Random Quote Generator</h1>

   <main class="quote-container">
      <blockquote>
         <p class="quote"></p>
      </blockquote>
      <p class="author">—</p>
   </main>

   <button type="button">Generate</button>

   <script src="script.js"></script>
</body>
</html>
