<!DOCTYPE html>
<html lang="en">
<head>
   <meta charset="UTF-8">
   <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <title>Guess Number</title>
   <style>
      * {
         margin: 0;
         padding: 0;
         font-family:'Courier New', Courier, monospace;
      }

      body {
         display: flex;
         flex-direction: column;
         justify-content: center;
         align-items: center;
         height: 100vh;
         background-color: #F0F9FF;
      }

      h1 {
         font-size: 35px;
      }

      main {
         margin-top: 20px;
         width: 18rem;
         padding: 2rem;
         display: flex;
         flex-direction: column;
         justify-content: center;
         align-items: center;
         border-radius: 16px;
         background-color: white;
         box-shadow: 2px 2px 4px rgba(0,0,0,0.5);
      }
      
      .field {
         width: 100%;
         display: flex;
         justify-content: center;
         align-items: center;
         gap: 14px;
      }

      .buttons {
         width: 100%;
         display: none;
         justify-content: center;
         align-items: center;
         gap: 14px;
      }

      main .field input {
         width: 40%;
         padding: 8px;
         text-align: center;
         border: 1.5px solid #A1A1A1;
         border-radius: 4px;
      }
      
      button {
         padding: 10px 18px;
         font-size: 14px;
         font-weight: 600;
         border-radius: 4px;
         border: none;
         background-color: #A1A1A1;
         color: white;
         cursor: pointer;
         box-shadow: 2px 2px 4px rgba(0,0,0,0.25);
         transition: background-color 0.2s ease-out;
      }

      button:active {
         box-shadow: none;
         background-color: #525252;
      }
      
      main .display {
         background-color: #BEDBFF;
         border: 1.5px solid #A1A1A1;
         border-style: dashed;
         margin-top: 1.5rem;
         display: flex;
         flex-direction: column;
         justify-content: center;
         align-items: center;
         gap: 8px;
         width: 100%;
         border-radius: 4px;
         padding-block: 3rem;
      }

      main .display h3 {
         font-size: 17px;
      }

      main .display p {
         font-size: 14px;
      }

      @media (width >= 48rem) {
         h1 {
            font-size: 50px;
         }

         main {
            width: 30rem;
         }

         main .display {
            gap: 10px;
         }

         main .display h3 {
            font-size: 26px;
         }

         main .display p {
            font-size: 18px;
         }
      }
   </style>
</head>
<body>
   <h1>Guess Number</h1>

   <main>
      <section class="field">
         <input type="number" placeholder="ketik angka" min="0" max="10">
         <button type="button">Tebak</button>
      </section>
      <section class="buttons">
         <button type="button">Ya</button>
         <button type="button">Tidak</button>
      </section>

      <section class="display">
         <h3>Siap? Mari mulai!</h3>
         <p></p>
      </section>
   </main>

   <script src="script.js"></script>
</body>
</html>
